<ion-header>
  <ion-toolbar>
    <ion-title>Squadre</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @for (squadra of dati; track squadra.idsquadra) {

  <swiper-container slides-per-view="auto" resistance-ratio="0">
    <swiper-slide style="width: 100%">
      <ion-card
        button="true"
        [routerLink]="['/tabs/modifica-squadra', squadra.idsquadra]"
        style="margin: 4px 0"
      >
        <ion-card-header style="padding-top: 8px; padding-bottom: 4px">
          <!--  
          <ion-card-subtitle style="font-size: 0.7rem">
            ID: {{ squadra.idsquadra }}
            </ion-card-subtitle>
-->

          <ion-card-title
            style="font-size: 1rem; display: flex; align-items: center"
          >
            {{ squadra.nomeSquadra }}
          </ion-card-title>
        </ion-card-header>

        <ion-card-content
          style="
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-bottom: 10px;
          "
        >
          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              min-height: 24px;
            "
          >
            <ion-icon
              name="location-outline"
              style="
                font-size: 1rem;
                min-width: 20px;
                color: var(--ion-color-medium);
              "
            ></ion-icon>
            <span style="font-size: 0.85rem">{{ squadra.citta }}</span>
          </div>

          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              min-height: 24px;
            "
          >
            <ion-icon
              name="person-outline"
              style="
                font-size: 1rem;
                min-width: 20px;
                color: var(--ion-color-medium);
              "
            ></ion-icon>
            <span style="font-size: 0.85rem">{{ squadra.allenatore }}</span>
          </div>

          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              min-height: 24px;
            "
          >
            <ion-icon
              name="people-outline"
              style="
                font-size: 1rem;
                min-width: 20px;
                color: var(--ion-color-medium);
              "
            ></ion-icon>
            <span style="font-size: 0.85rem"
              >{{ squadra.giocatori.length }} Giocatori</span
            >
          </div>
        </ion-card-content>
      </ion-card>
    </swiper-slide>

    <swiper-slide style="width: 80px; display: flex">
      <ion-button
        color="danger"
        fill="clear"
        (click)="delete(squadra.idsquadra)"
        style="color: white; width: 100%; height: 100%; font-size: 1.5rem"
      >
        <ion-icon name="trash" slot="icon-only"></ion-icon>
      </ion-button>
    </swiper-slide>
  </swiper-container>

  }
</ion-content>

<ion-fab slot="fixed" vertical="bottom" horizontal="end">
  <ion-fab-button routerLink="/tabs/aggiungi-squadra">
    <ion-icon name="add-outline"></ion-icon>
  </ion-fab-button>
</ion-fab>
