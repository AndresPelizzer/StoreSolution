<ion-header>
  <ion-toolbar>
    <ion-title>Squadre</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Aggiungi squadra</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-input
        [(ngModel)]="nuovaSquadra.nomeSquadra"
        label="Nome squadra"
        fill="outline"
        labelPlacement="floating"
      ></ion-input>
      <br />
      <ion-input
        [(ngModel)]="nuovaSquadra.citta"
        label="Città"
        fill="outline"
        labelPlacement="floating"
      ></ion-input>
      <br />
      <ion-input
        [(ngModel)]="nuovaSquadra.allenatore"
        label="Allenatore"
        fill="outline"
        labelPlacement="floating"
      ></ion-input>
      <br />
      <ion-input
        [(ngModel)]="nuovaSquadra.numeroGiocatoriInRosa"
        label="Numero giocatori"
        fill="outline"
        type="number"
        labelPlacement="floating"
      ></ion-input>
      <br />
      <ion-button expand="block" (click)="post()">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Aggiungi
      </ion-button>
    </ion-card-content>
  </ion-card>

  @for (squadra of dati; track squadra.idsquadra) {

  <swiper-container slides-per-view="auto" resistance-ratio="0">
    <swiper-slide style="width: 100%">
      <ion-card style="margin: 10px 0">
        <ion-card-header>
          <ion-card-subtitle>ID: {{ squadra.idsquadra }}</ion-card-subtitle>
          <ion-card-title>{{ squadra.nomeSquadra }}</ion-card-title>
        </ion-card-header>

        <ion-card-content>
          <p>
            <ion-icon name="location-outline"></ion-icon> {{ squadra.citta }}
          </p>
          <p>
            <ion-icon name="person-outline"></ion-icon> {{ squadra.allenatore }}
          </p>
          <p>
            <ion-icon name="people-outline"></ion-icon>
            {{ squadra.numeroGiocatoriInRosa || 0 }}
          </p>

          <ion-button color="warning" (click)="modifica(squadra.idsquadra)">
            <ion-icon name="pencil" slot="start"></ion-icon>Modifica
          </ion-button>
        </ion-card-content>
      </ion-card>
    </swiper-slide>
    <swiper-slide style="width: 80px; display: flex">
      <ion-button
        color="danger"
        fill="clear"
        (click)="delete(squadra.idsquadra)"
        style="color: white; width: 100%; height: 100%; font-size: 1.5rem"
      >
        <ion-icon name="trash" slot="icon-only"></ion-icon>
      </ion-button>
    </swiper-slide>
  </swiper-container>
  @if (squadraInModifica === squadra.idsquadra) {
  <ion-card>
    <ion-card-content>
      <ion-input
        [(ngModel)]="squadra.nomeSquadra"
        label="Nome"
        label-placement="stacked"
        fill="outline"
      ></ion-input>
      <br />
      <ion-input
        [(ngModel)]="squadra.citta"
        label="Città"
        label-placement="stacked"
        fill="outline"
      ></ion-input>
      <br />
      <ion-input
        [(ngModel)]="squadra.allenatore"
        label="Allenatore"
        label-placement="stacked"
        fill="outline"
      ></ion-input>
      <br />
      <ion-button expand="block" (click)="update(squadra.idsquadra,squadra)">
        <ion-icon name="checkmark" slot="start"></ion-icon> Salva
      </ion-button>
      <br />
    </ion-card-content>
  </ion-card>
  } }
</ion-content>
