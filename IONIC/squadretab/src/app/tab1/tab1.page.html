<ion-header>
  <ion-toolbar>
    <ion-title>Squadre</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @for (squadra of dati; track squadra.idsquadra) {

  <swiper-container slides-per-view="auto" resistance-ratio="0">
    <swiper-slide style="width: 100%">
      <ion-card
        button="true"
        (click)="modifica(squadra.idsquadra)"
        style="margin: 10px 0"
      >
        @if (squadraInModifica === squadra.idsquadra) {
        <ion-card-header>
          <ion-card-subtitle>ID: {{ squadra.idsquadra }}</ion-card-subtitle>
          <ion-card-title style="margin-top: 8px">
            <ion-input
              [(ngModel)]="squadra.nomeSquadra"
              fill="outline"
              label="Nome Squadra"
              label-placement="stacked"
            >
            </ion-input>
          </ion-card-title>
        </ion-card-header>

        <ion-card-content
          style="display: flex; flex-direction: column; gap: 16px"
        >
          <div style="display: flex; align-items: center; gap: 12px">
            <ion-icon
              name="location-outline"
              style="font-size: 1.4rem; min-width: 24px"
            ></ion-icon>
            <ion-input
              [(ngModel)]="squadra.citta"
              fill="outline"
              label="Città"
              label-placement="stacked"
              style="width: 100%"
            ></ion-input>
          </div>

          <div style="display: flex; align-items: center; gap: 12px">
            <ion-icon
              name="person-outline"
              style="font-size: 1.4rem; min-width: 24px"
            ></ion-icon>
            <ion-input
              [(ngModel)]="squadra.allenatore"
              fill="outline"
              label="Allenatore"
              label-placement="stacked"
              style="width: 100%"
            ></ion-input>
          </div>

          <div style="display: flex; align-items: center; gap: 12px">
            <ion-icon
              name="people-outline"
              style="font-size: 1.4rem; min-width: 24px"
            ></ion-icon>
            <ion-input
              [(ngModel)]="squadra.numeroGiocatoriInRosa"
              type="number"
              fill="outline"
              label="Giocatori"
              label-placement="stacked"
              style="width: 100%"
            ></ion-input>
          </div>

          <div style="display: flex; gap: 10px; margin-top: 8px">
            <ion-button
              expand="block"
              style="flex: 1"
              (click)=" update(squadra.idsquadra, squadra)"
            >
              <ion-icon name="checkmark" slot="start"></ion-icon> Salva
            </ion-button>
          </div>
        </ion-card-content>

        } @else {
        <ion-card-header>
          <ion-card-subtitle>ID: {{ squadra.idsquadra }}</ion-card-subtitle>
          <ion-card-title
            style="min-height: 38px; display: flex; align-items: center"
          >
            {{ squadra.nomeSquadra }}
          </ion-card-title>
        </ion-card-header>

        <ion-card-content
          style="display: flex; flex-direction: column; gap: 16px"
        >
          <div
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              min-height: 38px;
            "
          >
            <ion-icon
              name="location-outline"
              style="
                font-size: 1.4rem;
                min-width: 24px;
                color: var(--ion-color-medium);
              "
            ></ion-icon>
            <span style="font-size: 1rem">{{ squadra.citta }}</span>
          </div>

          <div
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              min-height: 38px;
            "
          >
            <ion-icon
              name="person-outline"
              style="
                font-size: 1.4rem;
                min-width: 24px;
                color: var(--ion-color-medium);
              "
            ></ion-icon>
            <span style="font-size: 1rem">{{ squadra.allenatore }}</span>
          </div>

          <div
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              min-height: 38px;
            "
          >
            <ion-icon
              name="people-outline"
              style="
                font-size: 1.4rem;
                min-width: 24px;
                color: var(--ion-color-medium);
              "
            ></ion-icon>
            <span style="font-size: 1rem"
              >{{ squadra.numeroGiocatoriInRosa }} Giocatori</span
            >
          </div>
        </ion-card-content>
        }
      </ion-card>
    </swiper-slide>

    <swiper-slide style="width: 80px; display: flex">
      <ion-button
        color="danger"
        fill="clear"
        (click)="delete(squadra.idsquadra)"
        style="color: white; width: 100%; height: 100%; font-size: 1.5rem"
      >
        <ion-icon name="trash" slot="icon-only"></ion-icon>
      </ion-button>
    </swiper-slide>
  </swiper-container>

  }
</ion-content>

<ion-fab slot="fixed" vertical="bottom" horizontal="end">
  <ion-fab-button routerLink="/aggiungi-squadra">
    <ion-icon name="add-outline"></ion-icon>
  </ion-fab-button>
</ion-fab>
