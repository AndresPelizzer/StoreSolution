<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding login-content">
  <ion-card class="login-card">
    <ion-card-header class="login-header">
      <div class="login-icon-circle">
        <ion-icon name="lock-closed-outline"></ion-icon>
      </div>
      <h4>Bentornato</h4>
      <p>Accedi al tuo account</p>
    </ion-card-header>

    <ion-card-content>
      <ion-item lines="none" fill="outline" class="login-item">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input
          [(ngModel)]="credenziali.username"
          placeholder="scrivi il tuo username"
          label="Username"
          labelPlacement="floating"
        ></ion-input>
      </ion-item>

      <ion-item lines="none" fill="outline" class="login-item">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input
          [(ngModel)]="credenziali.password"
          placeholder="scrivi la tua password"
          type="password"
          label="Password"
          labelPlacement="floating"
        ></ion-input>
      </ion-item>
    </ion-card-content>

    <ion-button expand="block" class="login-button" (click)="login()">
      Accedi
      <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
    </ion-button>
  </ion-card>

  @if (errore) {
  <div class="login-error">
    <ion-icon name="alert-circle-outline"></ion-icon>
    <ion-text color="danger">{{ errore }}</ion-text>
  </div>
  }
</ion-content>
