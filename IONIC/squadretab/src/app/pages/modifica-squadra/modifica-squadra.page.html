<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <ion-title>Modifica Squadra</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-subtitle
        >ID: {{ squadraModificata.idsquadra }}</ion-card-subtitle
      >
    </ion-card-header>

    <ion-card-content style="display: flex; flex-direction: column; gap: 16px">
      <ion-input
        [(ngModel)]="squadraModificata.nomeSquadra"
        fill="outline"
        label="Nome Squadra"
        label-placement="stacked"
      ></ion-input>

      <div style="display: flex; align-items: center; gap: 12px">
        <ion-icon
          name="location-outline"
          style="font-size: 1.4rem; min-width: 24px"
        ></ion-icon>
        <ion-input
          [(ngModel)]="squadraModificata.citta"
          fill="outline"
          label="Città"
          label-placement="stacked"
          style="width: 100%"
        ></ion-input>
      </div>

      <div style="display: flex; align-items: center; gap: 12px">
        <ion-icon
          name="person-outline"
          style="font-size: 1.4rem; min-width: 24px"
        ></ion-icon>
        <ion-input
          [(ngModel)]="squadraModificata.allenatore"
          fill="outline"
          label="Allenatore"
          label-placement="stacked"
          style="width: 100%"
        ></ion-input>
      </div>

      <div style="display: flex; align-items: center; gap: 12px">
        <ion-icon
          name="people-outline"
          style="font-size: 1.4rem; min-width: 24px"
        ></ion-icon>
        <ion-input
          [(ngModel)]="squadraModificata.numeroGiocatoriInRosa"
          type="number"
          fill="outline"
          label="Giocatori"
          label-placement="stacked"
          style="width: 100%"
        ></ion-input>
      </div>

      <ion-button expand="block" (click)="update()">
        <ion-icon name="checkmark" slot="start"></ion-icon> Salva
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
