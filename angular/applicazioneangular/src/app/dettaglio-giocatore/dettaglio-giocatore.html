<h1>Dettaglio Giocatore {{ codice }}</h1>

@if (giocatore === null) {
  <em>Attendere...</em>
} @else {
  <div class="card mt-3 p-3">
    <p>
      <strong>Nome:</strong>
      <input
        [value]="nuovoGiocatore.name"
        (input)="nuovoGiocatore.name = $any($event.target).value"
        class="form-control mt-1"
      />
    </p>
    <p>
      <strong>Cognome:</strong>
      <input
        [value]="nuovoGiocatore.username"
        (input)="nuovoGiocatore.username = $any($event.target).value"
        class="form-control mt-1"
      />
    </p>
    <p>
      <strong>Email:</strong>
      <input
        [value]="nuovoGiocatore.email"
        (input)="nuovoGiocatore.email = $any($event.target).value"
        class="form-control mt-1"
      />
    </p>

    <button type="button" class="btn btn-primary mt-2" (click)="modifica(codice)">
      Salva Modifica
    </button>

    <button type="button" class="btn btn-outline-info" (click)="annulla()">Annulla</button>
    <button type="button" class="btn btn-outline-danger" (click)="elimina(codice)">Elimina</button>
  </div>
}

<div class="mt-3">
  <a routerLink="/tabellagiocatori" class="btn btn-secondary">Premi per tornare alla lista</a>
</div>
